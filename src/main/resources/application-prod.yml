spring:
  datasource:
    url: jdbc:mysql://localhost:3306/iam_prod?useUnicode=true&characterEncoding=utf8&useSSL=true&serverTimezone=Asia/Shanghai
    username: prod_user
    password: prod_password
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect

  data:
    redis:
      host: localhost
      port: 6379
      password: prod_redis_password

dubbo:
  application:
    name: Dubbo-IAM-Center
  registry:
    address: zookeeper://101.34.8.116:2181
  protocol:
    name: dubbo
    port: 28080
  consumer:
    check: false
    lazy: true